name: Deploy

# Deploys the web surfaces (console, marketing, mobile, api).
#
#   git tag vX.Y.Z + push        -> PRODUCTION release (all apps, top-level config)
#   Actions → Deploy → Run        -> PREVIEW deploy on demand (workers.dev)
#
# Plain branch pushes DO NOT build — so syncing WIP between machines is free.
# Cut a release with `npm run release` (bumps versions + creates the tag).
#
# One-time REPOSITORY secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN           – token with "Edit Cloudflare Workers"
#   CLOUDFLARE_ACCOUNT_ID          – your Cloudflare account id
#   # Production frontend config (used on tag builds). Optional until a separate
#   # prod Supabase exists — if unset, the app's baked-in current Supabase is
#   # used (a warning is emitted). Publishable key is public-safe.
#   PROD_SUPABASE_URL, PROD_SUPABASE_PUBLISHABLE_KEY, PROD_API_URL
#   # Preview/dev frontend config (used on manual runs). Optional (fallbacks).
#   DEV_SUPABASE_URL, DEV_SUPABASE_PUBLISHABLE_KEY
#
# One-time REPOSITORY variables (not secret):
#   API_DEPLOY_ENV  – leave UNSET to deploy the current top-level API on a tag.
#                     Set to `production` once apps/api `[env.production]` (prod
#                     Supabase + Hyperdrive) is live, to deploy the prod worker.
#   MARKETING_SITE  – canonical host for the sitemap. Defaults to the dev apex;
#                     set to https://pumpos.app once that domain is live.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      app:
        description: Which app(s) to deploy to PREVIEW (workers.dev)
        type: choice
        default: all
        options: [all, console, marketing, mobile, api]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  console:
    if: github.ref_type == 'tag' || contains(fromJSON('["all","console"]'), github.event.inputs.app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Select environment config
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            if [ -n "${{ secrets.PROD_SUPABASE_URL }}" ]; then
              echo "VITE_SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}" >> "$GITHUB_ENV"
              echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.PROD_SUPABASE_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
              [ -n "${{ secrets.PROD_API_URL }}" ] && echo "VITE_API_URL=${{ secrets.PROD_API_URL }}" >> "$GITHUB_ENV"
            else
              echo "::warning::PROD_SUPABASE_URL unset — using the app's baked-in Supabase. Set PROD_* once the separate prod Supabase exists."
            fi
          else
            [ -n "${{ secrets.DEV_SUPABASE_URL }}" ] && echo "VITE_SUPABASE_URL=${{ secrets.DEV_SUPABASE_URL }}" >> "$GITHUB_ENV"
            [ -n "${{ secrets.DEV_SUPABASE_PUBLISHABLE_KEY }}" ] && echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.DEV_SUPABASE_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi
      - name: Build console
        run: npm run build:ui-console
      - name: Deploy console
        working-directory: apps/console
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            npx wrangler deploy
          else
            npx wrangler deploy --env preview
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  marketing:
    if: github.ref_type == 'tag' || contains(fromJSON('["all","marketing"]'), github.event.inputs.app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build marketing
        run: npm run build:marketing
        env:
          SITE: ${{ vars.MARKETING_SITE || 'https://pumpos.abdullahnettoor.com' }}
      - name: Deploy marketing
        working-directory: apps/marketing
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            npx wrangler deploy
          else
            npx wrangler deploy --env preview
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  mobile:
    if: github.ref_type == 'tag' || contains(fromJSON('["all","mobile"]'), github.event.inputs.app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Select environment config
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            if [ -n "${{ secrets.PROD_SUPABASE_URL }}" ]; then
              echo "VITE_SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}" >> "$GITHUB_ENV"
              echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.PROD_SUPABASE_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
              [ -n "${{ secrets.PROD_API_URL }}" ] && echo "VITE_API_URL=${{ secrets.PROD_API_URL }}" >> "$GITHUB_ENV"
            else
              echo "::warning::PROD_SUPABASE_URL unset — using the app's baked-in Supabase."
            fi
          else
            [ -n "${{ secrets.DEV_SUPABASE_URL }}" ] && echo "VITE_SUPABASE_URL=${{ secrets.DEV_SUPABASE_URL }}" >> "$GITHUB_ENV"
            [ -n "${{ secrets.DEV_SUPABASE_PUBLISHABLE_KEY }}" ] && echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.DEV_SUPABASE_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
          fi
      - name: Build mobile
        run: npm run build:ui-mobile
      - name: Deploy mobile
        working-directory: apps/mobile
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            npx wrangler deploy
          else
            npx wrangler deploy --env preview
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  api:
    if: github.ref_type == 'tag' || contains(fromJSON('["all","api"]'), github.event.inputs.app)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build workspace deps
        # wrangler bundles apps/api from source; its @pump/* imports resolve to
        # each package's dist/. `tsc -b` follows the tsconfig project references.
        run: npm run build:api
      - name: Deploy API
        working-directory: apps/api
        # On a tag: deploy prod. If API_DEPLOY_ENV is set (once the prod Supabase
        # stack exists) use that wrangler env; otherwise deploy the top-level
        # (current) worker. Manual/preview runs always hit the top-level worker.
        run: |
          if [ "${{ github.ref_type }}" = "tag" ] && [ -n "${{ vars.API_DEPLOY_ENV }}" ]; then
            npx wrangler deploy --env "${{ vars.API_DEPLOY_ENV }}"
          else
            npx wrangler deploy
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
