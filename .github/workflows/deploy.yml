name: Deploy

# Deploys the web surfaces (console, marketing, mobile, api).
#
#   git tag vX.Y.Z + push -> PRODUCTION release (top-level wrangler config)
#   push to dev           -> PREVIEW release (env.preview custom domains)
#   Actions -> Deploy     -> PREVIEW deploy on demand (choose app)
#
# Plain pushes to non-dev branches do not build.
#
# Required REPOSITORY secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   PROD_SUPABASE_URL, PROD_SUPABASE_PUBLISHABLE_KEY, PROD_API_URL
# Optional preview/dev secrets:
#   DEV_SUPABASE_URL, DEV_SUPABASE_PUBLISHABLE_KEY
# Optional REPOSITORY variables:
#   PREVIEW_API_URL         defaults to https://api.pumpos.abdullahnettoor.com
#   MARKETING_SITE          defaults to https://pumpos.app for tags
#   CONSOLE_URL             defaults to https://console.pumpos.app for tags
#   DOWNLOAD_MANIFEST_URL   empty => bundled placeholder manifest

on:
  push:
    branches:
      - dev
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      app:
        description: Which app(s) to deploy to PREVIEW
        type: choice
        default: all
        options: [all, console, marketing, mobile, api]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      console: ${{ steps.filter.outputs.console }}
      marketing: ${{ steps.filter.outputs.marketing }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/core/**'
              - 'packages/db/**'
              - 'packages/shared/**'
              - 'package-lock.json'
              - '.github/workflows/deploy.yml'
            console:
              - 'apps/console/**'
              - 'packages/ui/**'
              - 'packages/shared/**'
              - 'package-lock.json'
              - '.github/workflows/deploy.yml'
            marketing:
              - 'apps/marketing/**'
              - 'package-lock.json'
              - '.github/workflows/deploy.yml'
            mobile:
              - 'apps/mobile/**'
              - 'packages/ui/**'
              - 'packages/shared/**'
              - 'package-lock.json'
              - '.github/workflows/deploy.yml'

  console:
    needs: changes
    if: github.ref_type == 'tag' || contains(fromJSON('["all","console"]'), github.event.inputs.app) || (github.event_name == 'push' && github.ref_name == 'dev' && needs.changes.outputs.console == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Select environment config
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VITE_SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}" >> "$GITHUB_ENV"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.PROD_SUPABASE_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
            echo "VITE_API_URL=${{ secrets.PROD_API_URL }}" >> "$GITHUB_ENV"
          else
            [ -n "${{ secrets.DEV_SUPABASE_URL }}" ] && echo "VITE_SUPABASE_URL=${{ secrets.DEV_SUPABASE_URL }}" >> "$GITHUB_ENV"
            [ -n "${{ secrets.DEV_SUPABASE_PUBLISHABLE_KEY }}" ] && echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.DEV_SUPABASE_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
            echo "VITE_API_URL=${{ vars.PREVIEW_API_URL || 'https://api.pumpos.abdullahnettoor.com' }}" >> "$GITHUB_ENV"
          fi
      - name: Build console
        run: npm run build:ui-console
      - name: Deploy console
        working-directory: apps/console
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            npx wrangler deploy
          else
            npx wrangler deploy --env preview
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  marketing:
    needs: changes
    if: github.ref_type == 'tag' || contains(fromJSON('["all","marketing"]'), github.event.inputs.app) || (github.event_name == 'push' && github.ref_name == 'dev' && needs.changes.outputs.marketing == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build marketing
        run: npm run build:marketing
        env:
          SITE: ${{ github.ref_type == 'tag' && (vars.MARKETING_SITE || 'https://pumpos.app') || 'https://pumpos.abdullahnettoor.com' }}
          PUBLIC_CONSOLE_URL: ${{ github.ref_type == 'tag' && (vars.CONSOLE_URL || 'https://console.pumpos.app') || 'https://console.pumpos.abdullahnettoor.com' }}
          PUBLIC_DOWNLOAD_MANIFEST_URL: ${{ vars.DOWNLOAD_MANIFEST_URL }}
      - name: Deploy marketing
        working-directory: apps/marketing
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            npx wrangler deploy
          else
            npx wrangler deploy --env preview
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  mobile:
    needs: changes
    if: github.ref_type == 'tag' || contains(fromJSON('["all","mobile"]'), github.event.inputs.app) || (github.event_name == 'push' && github.ref_name == 'dev' && needs.changes.outputs.mobile == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Select environment config
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "VITE_SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}" >> "$GITHUB_ENV"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.PROD_SUPABASE_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
            echo "VITE_API_URL=${{ secrets.PROD_API_URL }}" >> "$GITHUB_ENV"
          else
            [ -n "${{ secrets.DEV_SUPABASE_URL }}" ] && echo "VITE_SUPABASE_URL=${{ secrets.DEV_SUPABASE_URL }}" >> "$GITHUB_ENV"
            [ -n "${{ secrets.DEV_SUPABASE_PUBLISHABLE_KEY }}" ] && echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.DEV_SUPABASE_PUBLISHABLE_KEY }}" >> "$GITHUB_ENV"
            echo "VITE_API_URL=${{ vars.PREVIEW_API_URL || 'https://api.pumpos.abdullahnettoor.com' }}" >> "$GITHUB_ENV"
          fi
      - name: Build mobile
        run: npm run build:ui-mobile
      - name: Deploy mobile
        working-directory: apps/mobile
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            npx wrangler deploy
          else
            npx wrangler deploy --env preview
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  api:
    needs: changes
    if: github.ref_type == 'tag' || contains(fromJSON('["all","api"]'), github.event.inputs.app) || (github.event_name == 'push' && github.ref_name == 'dev' && needs.changes.outputs.api == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build workspace deps
        run: npm run build:api
      - name: Deploy API
        working-directory: apps/api
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            npx wrangler deploy
          else
            npx wrangler deploy --env preview
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
