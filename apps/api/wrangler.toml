# Top-level deploy is production. Preview/dev deploys use `[env.preview]` below.
name = "pumpos-api-prod"
main = "src/index.ts"
compatibility_date = "2026-06-24"
compatibility_flags = [ "nodejs_compat_v2" ]

# --- Plaintext vars (NOT secrets) ----------------------------------------
# SUPABASE_URL is the public project URL (same one the frontend anon client
# uses), so it is safe to commit here. It is read by the Auth Admin adapter
# (Phase A). The matching SUPABASE_SERVICE_ROLE_KEY is a SECRET and must be set
# with `wrangler secret put SUPABASE_SERVICE_ROLE_KEY` — never put it in [vars].
[vars]
SUPABASE_URL = "https://sniubtppskopxkpznfkh.supabase.co"
# Comma-separated allow-list of platform-admin emails permitted to call
# /platform/* (owner provisioning). Emails aren't secret, so this is plaintext.
PLATFORM_ADMIN_EMAILS = "abdullahnettoor@gmail.com"
# Destination for owner-invite links (must be in the Supabase redirect allow-list).
INVITE_REDIRECT_URL = "https://console.pumpos.app/accept-invite"

[[routes]]
pattern = "api.pumpos.app"
custom_domain = true

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "44db8c2a98344989a2a2c572638deb63"
# TODO(prod-db): replace the id above with the dedicated production Hyperdrive
# id when you are ready for true DB isolation. Keeping the current id lets you
# temporarily use the preview/dev Supabase from production for initial testing.
# Local default for Docker-based Supabase.
# Remote Supabase users should override with:
# CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE=<DIRECT_DATABASE_URL>
localConnectionString = "postgresql://postgres:postgres@127.0.0.1:54322/postgres"

# --- Hyperdrive fallback -------------------------------------------------
# The worker also reads an OPTIONAL secret `SUPABASE_DIRECT_URL`. When set,
# it bypasses Hyperdrive and connects directly (typically via Supabase's
# Supavisor pooler on port 6543). Use this to work around Hyperdrive daily
# quota outages on the free plan.
#
#   # Set the direct URL (Supavisor transaction pooler):
#   wrangler secret put SUPABASE_DIRECT_URL
#     postgresql://postgres.<ref>:<password>@aws-0-<region>.pooler.supabase.com:6543/postgres
#
#   # Remove it to restore Hyperdrive routing:
#   wrangler secret delete SUPABASE_DIRECT_URL

[observability]
enabled = true
head_sampling_rate = 0.1

[observability.logs]
enabled = true
head_sampling_rate = 0.1
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 0.1

# SUPABASE_JWT_SECRET is intentionally NOT required. New Supabase JWTs should be
# ES256 and are verified through JWKS. If a project still issues legacy HS256
# tokens, set this secret as an optional fallback:
#   wrangler secret put SUPABASE_JWT_SECRET

[env.preview]
name = "preview-pumpos-api"
workers_dev = false

# Preview currently shares the same Supabase project as prod. When you split
# environments, point this at the dedicated preview/dev project URL (and set a
# separate SUPABASE_SERVICE_ROLE_KEY via `wrangler secret put ... --env preview`).
[env.preview.vars]
SUPABASE_URL = "https://sniubtppskopxkpznfkh.supabase.co"
PLATFORM_ADMIN_EMAILS = "abdullahnettoor@gmail.com"
INVITE_REDIRECT_URL = "https://console.pumpos.abdullahnettoor.com/accept-invite"

[[env.preview.routes]]
pattern = "api.pumpos.abdullahnettoor.com"
custom_domain = true

[[env.preview.hyperdrive]]
binding = "HYPERDRIVE"
id = "44db8c2a98344989a2a2c572638deb63"

[env.preview.observability]
enabled = true
