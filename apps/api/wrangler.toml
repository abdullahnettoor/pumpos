name = "pumpos-api"
main = "src/index.ts"
compatibility_date = "2026-06-24"
compatibility_flags = [ "nodejs_compat_v2" ]

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "44db8c2a98344989a2a2c572638deb63"
# Local default for Docker-based Supabase.
# Remote Supabase users should override with:
# CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE=<DIRECT_DATABASE_URL>
localConnectionString = "postgresql://postgres:postgres@127.0.0.1:54322/postgres"

# --- Hyperdrive fallback -------------------------------------------------
# The worker also reads an OPTIONAL secret `SUPABASE_DIRECT_URL`. When set,
# it bypasses Hyperdrive and connects directly (typically via Supabase's
# Supavisor pooler on port 6543). Use this to work around Hyperdrive daily
# quota outages on the free plan.
#
#   # Set the direct URL (Supavisor transaction pooler):
#   wrangler secret put SUPABASE_DIRECT_URL
#     postgresql://postgres.<ref>:<password>@aws-0-<region>.pooler.supabase.com:6543/postgres
#
#   # Remove it to restore Hyperdrive routing:
#   wrangler secret delete SUPABASE_DIRECT_URL

[observability]
enabled = true
head_sampling_rate = 0.1

[observability.logs]
enabled = true
head_sampling_rate = 0.1
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 0.1

[secrets]
required = [ "SUPABASE_JWT_SECRET" ]

# ---------------------------------------------------------------------------
# PRODUCTION API (separate Supabase instance)
# ---------------------------------------------------------------------------
# The top-level config above is the DEV stack (dev Supabase). Production uses a
# DIFFERENT Supabase project, so it needs its own worker, its own Hyperdrive
# config (pointing at the prod DB), and the prod project's JWT secret.
#
# Deploy prod explicitly (kept out of auto-deploy):   wrangler deploy --env production
#
# Setup checklist when the prod Supabase project exists:
#   1. Create a Hyperdrive config for the prod DB direct connection:
#        wrangler hyperdrive create pumpos-prod \
#          --connection-string "postgresql://postgres.<ref>:<pwd>@<host>:5432/postgres"
#      then paste the returned id below.
#   2. Set the prod JWT secret on the prod worker:
#        wrangler secret put SUPABASE_JWT_SECRET --env production
#   3. Point the frontends at this worker via PROD_API_URL (api.pumpos.app).
#
# [env.production]
# name = "pumpos-api-prod"
# [[env.production.routes]]
# pattern = "api.pumpos.app"
# custom_domain = true
#
# [[env.production.hyperdrive]]
# binding = "HYPERDRIVE"
# id = "<PROD_HYPERDRIVE_ID>"
#
# [env.production.observability]
# enabled = true
#
# [env.production.secrets]
# required = [ "SUPABASE_JWT_SECRET" ]
