name = "pumpos-console"
main = "worker/index.ts"
compatibility_date = "2026-06-24"

# Production console lives on the `console.` subdomain. The custom domain (and
# its DNS record + cert) is provisioned by this route on deploy once the zone
# exists. Until `pumpos.app` is purchased, deploy targets the dev custom domain.
[[routes]]
pattern = "console.pumpos.app"
custom_domain = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Run the mobile-gate Worker before serving static assets so phones are
# redirected to `m.<zone>` without downloading the SPA bundle.
run_worker_first = true

# Preview / dev deploy — served on workers.dev (no subdomain concept there;
# the in-app gate covers mobile on this host).
[env.preview]
name = "dev-pumpos-console"
main = "worker/index.ts"
workers_dev = true
# Don't inherit the top-level custom domain — preview stays on workers.dev.
routes = []

[env.preview.assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true
