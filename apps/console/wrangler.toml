name = "pumpos-console"
main = "worker/index.ts"
compatibility_date = "2026-06-24"

# Production console lives on the `console.` subdomain.
[[routes]]
pattern = "console.pumpos.app"
custom_domain = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Run the mobile-gate Worker before serving static assets so phones are
# redirected to `m.<zone>` without downloading the SPA bundle.
run_worker_first = true

# Preview / dev deploy — stable custom preview domain.
[env.preview]
name = "preview-pumpos-console"
main = "worker/index.ts"
workers_dev = false

[[env.preview.routes]]
pattern = "console.pumpos.abdullahnettoor.com"
custom_domain = true

[env.preview.assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true
