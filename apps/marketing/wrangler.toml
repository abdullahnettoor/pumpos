name = "pumpos-marketing"
compatibility_date = "2026-06-24"

# Marketing owns the production apex.
[[routes]]
pattern = "pumpos.app"
custom_domain = true

[assets]
directory = "./dist"
# Astro emits real .html files; use 404.html for unmatched routes rather than
# SPA fallback (this is a multi-page static site, not an SPA).
not_found_handling = "404-page"

# Preview / dev deploy — stable custom preview domain.
[env.preview]
name = "preview-pumpos-marketing"
workers_dev = false

[[env.preview.routes]]
pattern = "pumpos.abdullahnettoor.com"
custom_domain = true

[env.preview.assets]
directory = "./dist"
not_found_handling = "404-page"
