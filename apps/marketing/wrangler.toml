name = "pumpos-marketing"
compatibility_date = "2026-06-24"

# Marketing owns the apex. Custom domain + cert auto-provisioned on first prod
# deploy (zone must be active in the account). Until pumpos.app is purchased,
# this targets the dev apex.
[[routes]]
pattern = "pumpos.app"
custom_domain = true

[assets]
directory = "./dist"
# Astro emits real .html files; use 404.html for unmatched routes rather than
# SPA fallback (this is a multi-page static site, not an SPA).
not_found_handling = "404-page"

# Preview / dev deploy — served on workers.dev.
[env.preview]
name = "dev-pumpos-marketing"
workers_dev = true
routes = []

[env.preview.assets]
directory = "./dist"
not_found_handling = "404-page"
