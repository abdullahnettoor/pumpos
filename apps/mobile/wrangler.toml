name = "pumpos-mobile"
compatibility_date = "2026-06-24"

# Mobile PWA lives on the `m.` subdomain. Custom domain + cert auto-provisioned
# on first prod deploy (zone must be active in the account).
[[routes]]
pattern = "m.pumpos.abdullahnettoor.com"
custom_domain = true

[assets]
directory = "./dist"
# Single-page app: unmatched routes fall back to index.html.
not_found_handling = "single-page-application"

# Preview / dev deploy — served on workers.dev.
[env.preview]
name = "dev-pumpos-mobile"
workers_dev = true
routes = []

[env.preview.assets]
directory = "./dist"
not_found_handling = "single-page-application"
