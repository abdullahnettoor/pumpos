name = "pumpos-mobile"
compatibility_date = "2026-06-24"

# Mobile PWA lives on the `m.` subdomain.
[[routes]]
pattern = "m.pumpos.app"
custom_domain = true

[assets]
directory = "./dist"
# Single-page app: unmatched routes fall back to index.html.
not_found_handling = "single-page-application"

# Preview / dev deploy — stable custom preview domain.
[env.preview]
name = "preview-pumpos-mobile"
workers_dev = false

[[env.preview.routes]]
pattern = "m.pumpos.abdullahnettoor.com"
custom_domain = true

[env.preview.assets]
directory = "./dist"
not_found_handling = "single-page-application"
